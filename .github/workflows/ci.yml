name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# The native engine only builds on Windows and the Cypress suite needs a running
# engine to talk to, so CI covers the frontend only. C++ changes are verified
# locally with `ctest --test-dir build -C Debug` and run-local-e2e.ps1.
jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      # `npm run test` starts vitest in watch mode and would hang the job.
      - name: Unit tests
        run: npx vitest run

      - name: Build
        run: npm run build
